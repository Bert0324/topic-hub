services:
  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: topichub

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - '3000:3000'
    environment:
      MONGODB_URI: mongodb://mongodb:27017/topichub
      PORT: '3000'
      SKILLS_DIR: /app/skills
      LOG_FORMAT: json
      LOG_LEVEL: info
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_PROVIDER: ${AI_PROVIDER:-ark}
      AI_API_URL: ${AI_API_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-doubao-seed-2-0-pro-260215}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-10000}
      AI_RATE_LIMIT_GLOBAL: ${AI_RATE_LIMIT_GLOBAL:-1000}
    volumes:
      - ./skills:/app/skills
    depends_on:
      - mongodb

volumes:
  mongodb_data:
